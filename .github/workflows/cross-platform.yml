name: cross-platform

# Cross-platform syntax and zero-quota fixture checks for Super Board and
# claudex-optimized. No `gh` auth, provider credentials, GitHub Project,
# proxy daemon, or live model calls are used.
#
# Security note: this workflow only interpolates `matrix.*` values (which
# are defined in this file). It does NOT consume any `github.event.*` input,
# so workflow-injection patterns from issue/PR titles or commit messages
# do not apply here.

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  smoke:
    name: smoke (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # Step 1 — proves the script is syntactically valid on this Python
      # version. Catches typing-syntax, f-string, walrus, etc. regressions
      # without needing runtime state or writing .pyc files.
      - name: compile super-board-status
        run: python -c "from pathlib import Path; p=Path('scripts/super-board-status.py'); compile(p.read_text(encoding='utf-8'), str(p), 'exec')"

      # Step 2 — exercise the "no config + no active marker + no single
      # config" path of super-board-status.py. Documented to exit 64.
      # Runs in the repo root, where no `.claude/super-board/configs/` exists.
      - name: status — no-config path exits 64
        shell: bash
        run: |
          set +e
          python scripts/super-board-status.py
          ec=$?
          set -e
          if [ "$ec" -ne 64 ]; then
            echo "::error::Expected exit 64 (no config), got $ec"
            exit 1
          fi
          echo "OK: super-board-status.py exited 64 as documented"

      # Step 3 — unit-test the manifest parser against real dispatcher log
      # lines from `scripts/super-board-run.sh`. Catches the class of
      # regression that ships when the parser's regexes drift away from
      # what the dispatcher actually emits.
      - name: status — parser fixture tests
        run: python -B tests/test_status_parse.py

      - name: claudex — compile zero-quota helpers
        run: python -c "from pathlib import Path; paths=[Path('skills/claudex-optimized/scripts/preflight.py'),Path('skills/claudex-optimized/scripts/probe-routing.py')]; [compile(p.read_text(encoding='utf-8'), str(p), 'exec') for p in paths]"

      - name: claudex — policy and structural fixture tests
        run: python -B tests/test_claudex_optimized.py

  claudex-powershell:
    name: claudex PowerShell fixtures
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: claudex — launcher and setup fixtures
        shell: powershell
        run: .\tests\test-claudex-launcher.ps1

  claudex-zero-quota-integration:
    name: claudex zero-quota integration (Claude Code 2.1.218)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pinned Claude Code CLI
        shell: powershell
        run: |
          npm install --global @anthropic-ai/claude-code@2.1.218
          $version = claude --version
          if ($LASTEXITCODE -ne 0 -or $version -notmatch '^2\.1\.218\b') {
            throw "Pinned Claude Code 2.1.218 is required; observed: $version"
          }
          Write-Output "Claude Code integration CLI: $version"

      - name: Run 176-tool fake-gateway integration
        shell: powershell
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -B .\skills\claudex-optimized\scripts\probe-routing.py local-tool-search --tools 176

      - name: Run live-bundle syntax integration against fake gateway
        shell: powershell
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -B .\skills\claudex-optimized\scripts\probe-routing.py local-bundle-syntax

      - name: Integration completion gate
        shell: powershell
        run: Write-Output 'Zero-quota integrations executed; this job never reports a unit-only skip as success.'

  wave-plan:
    name: wave-plan (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # Workflow-backend planner: 6 fixture scenarios, no gh calls.
      # Needs bash + jq, both preinstalled on ubuntu/macos runners.
      - name: wave-plan — fixture tests
        run: bash tests/test-wave-plan.sh

      # Syntax-check the dynamic workflow script the same way the
      # orchestrator's precondition 4 does (run-workflow.md).
      - name: wave workflow — node --check
        run: |
          { echo '(async function(){'; sed 's/^export const meta/const meta/' workflows/super-board-wave.js; echo '})'; } | node --check --input-type=module
          echo "OK: workflows/super-board-wave.js parses"
